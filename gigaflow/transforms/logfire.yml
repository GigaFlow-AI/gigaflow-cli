# Gigaflow built-in transform config for Pydantic Logfire.
#
# Use this when your agent is instrumented with pydantic-ai + logfire.
# Traces are read from Logfire's HTTP Query API (not PostgreSQL).
# Gigaflow's logfire datasource type handles the API connection.
#
# Span classification uses span_name prefix matching (mode: prefix)
# because pydantic-ai emits consistent span name prefixes:
#   "chat"          → llm_call (span_name is "chat <model>", e.g. "chat gpt-4o")
#   "running tool"  → tool_invocation
#   "agent run"     → user_input (root span carries the user's query)
#
# Attribute paths use OTel GenAI semantic conventions (gen_ai.*) which
# pydantic-ai emits natively. The logfire reader expands flat dotted
# OTel keys into nested dicts before the transform runs, so dot-notation
# paths work the same way as with Arize Phoenix.
#
# To use this built-in config: leave the transform file blank during
# `gigaflow setup` and select "logfire" as the source, or set
# TRANSFORM_CONFIG=logfire in gigaflow.env to load this file automatically.
#
version: "1"
source: "logfire"

primitives:

  # -------------------------------------------------------------------------
  # user_input — the root agent span carries the user's original query,
  # plus any subsequent per-turn user spans.
  #
  # Two span-name conventions land here:
  #   "agent run"  — pydantic-ai's root span for an invocation (first turn).
  #   "user turn"  — multi-turn user inputs beyond the first: * emitted by harnesses with a user simulator (e.g.
  #                      benchmarks/tau_bench) per simulator reply, and
  #                    * synthesised by the Logfire reader from
  #                      ``pydantic_ai.all_messages`` when a single
  #                      ``agent run`` contains multiple user-role messages.
  #
  # Both carry the user text under ``pydantic_ai.user_prompt`` so the
  # mapping below works for either source.
  # -------------------------------------------------------------------------
  user_input:
    filter:
      field: "span_name"
      value:
        - "agent run"
        - "user turn"
      mode: "exact"
    mapping:
      content:  "attributes.pydantic_ai.user_prompt"
      message:  "attributes.pydantic_ai.user_prompt"

  # -------------------------------------------------------------------------
  # llm_call — every "chat <model>" span is an LLM completion.
  # pydantic-ai emits one per model call with span_name "chat <model_name>"
  # (e.g. "chat gpt-4o", "chat fake-gpt-4o-mini") plus full GenAI semantic
  # attributes. Prefix matching on "chat" captures all model variants cleanly.
  # -------------------------------------------------------------------------
  llm_call:
    filter:
      field: "span_name"
      value: "chat"
      mode: "prefix"
    mapping:
      model:             "attributes.gen_ai.request.model"
      provider:          "attributes.gen_ai.system"
      input:             "attributes.gen_ai.input.messages"
      messages:          "attributes.gen_ai.input.messages"
      completion:        "attributes.gen_ai.output.messages"
      response:          "attributes.gen_ai.output.messages"
      prompt_tokens:     "attributes.gen_ai.usage.input_tokens"
      completion_tokens: "attributes.gen_ai.usage.output_tokens"

  # -------------------------------------------------------------------------
  # tool_invocation — every "running tool: <name>" span is a tool call.
  # The tool name is embedded in the span_name (prefix match captures all tools).
  # gen_ai.tool.name holds the bare name; tool_arguments and tool_response
  # hold the input/output as set by the pydantic-ai logfire integration (v2).
  # -------------------------------------------------------------------------
  tool_invocation:
    filter:
      field: "span_name"
      value: "running tool"
      mode: "prefix"
    mapping:
      tool_name:   "attributes.gen_ai.tool.name"
      tool_input:  "attributes.tool_arguments"
      tool_output: "attributes.tool_response"
      result:      "attributes.tool_response"
